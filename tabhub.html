<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TabHub · 瀑布流 v1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box}
:root{
  --ink:#0E0F12; --ink-soft:#3A3D45; --ink-mute:#6E727A;
  --bg:#F6F2EA; --bg-deep:#EDE6D8; --paper:#FFFBF3;
  --orange:#FF5A2E; --yellow:#FFD83A; --red:#E63946;
  --green:#1FA37A; --blue:#1E7BFF; --purple:#6E5BFF;
  --line:#1A1B1F12; --line-soft:#1A1B1F08;
  --shadow-sm:0 1px 0 #1A1B1F0A, 0 1px 3px #1A1B1F08;
  --shadow-md:0 2px 6px #1A1B1F10, 0 8px 24px #1A1B1F0A;
  --serif:'Instrument Serif','Songti SC','STSong',serif;
  --mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
  --sans:'Inter','PingFang SC','Microsoft YaHei',system-ui,sans-serif;
}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
body{background-image:linear-gradient(#1A1B1F08 1px,transparent 1px),linear-gradient(90deg,#1A1B1F08 1px,transparent 1px);background-size:32px 32px;background-position:-1px -1px}
button{font:inherit;color:inherit;background:none;border:0;cursor:pointer}
a{color:inherit;text-decoration:none}
kbd{font-family:var(--mono);font-size:11px;padding:2px 6px;border:1px solid var(--line);border-radius:5px;background:var(--paper);color:var(--ink-soft);box-shadow:inset 0 -1px 0 var(--line)}

/* topbar */
.topbar{position:sticky;top:0;z-index:50;background:#F6F2EAEE;backdrop-filter:saturate(180%) blur(12px);border-bottom:1px solid var(--line)}
.topbar-inner{max-width:1480px;margin:0 auto;padding:14px 28px;display:flex;align-items:center;gap:18px}
.brand{display:flex;align-items:center;gap:8px;font-weight:700;letter-spacing:-0.01em;font-size:17px;flex-shrink:0}
.brand-dot{width:10px;height:10px;background:var(--orange);border-radius:2px;transform:rotate(45deg)}
.brand em{font-family:var(--serif);font-style:italic;font-weight:400;font-size:19px;margin:0 1px}
.search{flex:1;max-width:560px;margin:0 auto;display:flex;align-items:center;gap:10px;padding:9px 14px;background:var(--paper);border:1px solid var(--line);border-radius:12px;color:var(--ink-mute);cursor:pointer;transition:.15s}
.search:hover{border-color:#1A1B1F26;color:var(--ink-soft)}
.search svg{flex-shrink:0}
.search-text{flex:1;font-size:13px;text-align:center}
.search kbd{margin-left:auto}
.top-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 12px;border-radius:9px;border:1px solid var(--line);background:var(--paper);font-size:13px;font-weight:500;transition:.15s}
.btn:hover{border-color:#1A1B1F26;transform:translateY(-1px);box-shadow:var(--shadow-sm)}
.btn-primary{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.btn-primary:hover{background:#000}

/* hero - three column */
.hero{max-width:1480px;margin:0 auto;padding:22px 28px 14px;display:grid;grid-template-columns:1fr 1.3fr 1fr;align-items:center;gap:24px;position:relative}
.hero-left{text-align:left}
.hero-left h1{margin:0;font-family:var(--serif);font-weight:400;font-size:clamp(28px,3vw,38px);line-height:1.1;letter-spacing:-0.02em;text-align:left}
.hero-left h1 .hl{background:linear-gradient(180deg,transparent 60%,#FFD83A 60%);padding:0 .12em}
.hero-left h1 em{font-style:italic;color:var(--orange)}
.hero-sub{color:var(--ink-soft);font-size:13px;margin-top:10px;max-width:460px;text-align:left}
.hero-mid{display:flex;align-items:center;justify-content:center;height:100%;position:relative;flex-direction:column;gap:14px}
/* EST capsule above tagline */
.hero-est{display:inline-flex;align-items:center;gap:10px;padding:6px 16px;border:1px solid var(--ink);border-radius:999px;font-family:var(--mono);font-size:10.5px;letter-spacing:.18em;color:var(--ink);background:transparent;white-space:nowrap}
.hero-est .star{width:7px;height:7px;background:var(--orange);clip-path:polygon(50% 0,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%)}
/* floating mini tab cards — image-1 style, placed in hero side whitespace */
.float-tab{position:absolute;background:var(--paper);border:1.5px solid var(--ink);border-radius:12px;padding:11px 14px 11px 13px;min-width:170px;max-width:210px;box-shadow:5px 6px 0 #0E0F1212, 0 1px 3px #1A1B1F0A;pointer-events:none;z-index:2;font-size:12px}
.float-tab .ft-head{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.float-tab .ft-fav{width:18px;height:18px;border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.float-tab .ft-fav img{width:16px;height:16px;display:block}
.float-tab .ft-t{font-weight:700;color:var(--ink);font-size:12.5px;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.01em}
.float-tab .ft-url{font-family:var(--mono);font-size:10.5px;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:8px}
.float-tab .ft-foot{display:flex;align-items:center;justify-content:space-between;font-size:10.5px;color:var(--ink-mute)}
.float-tab .ft-tag{color:var(--ink-soft);font-weight:500}
.float-tab .ft-m{font-family:var(--mono)}
/* positions: 1 on left (lower, below hero-left text), 2+3 on right; absolute to .hero */
.float-tab.ft-1{bottom:-26px;left:8px;transform:rotate(-3deg)}
.float-tab.ft-2{top:-18px;right:230px;transform:rotate(3deg)}
.float-tab.ft-3{bottom:-26px;right:14px;transform:rotate(-2deg)}
@media(max-width:1280px){.float-tab.ft-2{right:200px}}
@media(max-width:1080px){.float-tab{display:none}}
.brand-tagline{font-family:var(--serif);font-weight:400;font-style:italic;font-size:clamp(44px,5.6vw,84px);line-height:.96;letter-spacing:-0.03em;color:var(--ink);text-align:center;position:relative;padding:6px 28px;white-space:nowrap}
.brand-tagline::before{content:"";position:absolute;left:-4px;top:50%;width:22px;height:1.5px;background:var(--ink);transform:translateY(-50%)}
.brand-tagline::after{content:"";position:absolute;right:-4px;top:50%;width:22px;height:1.5px;background:var(--ink);transform:translateY(-50%)}
.brand-tagline .q{color:var(--orange);font-style:normal;margin-left:.02em;font-family:var(--serif)}
.brand-tagline .accent2{color:var(--orange);font-style:italic}
.hero-right{display:flex;justify-content:flex-end;gap:14px}
.stat{padding:10px 16px;background:var(--paper);border:1px solid var(--line);border-radius:10px;min-width:88px;text-align:center}
.stat-n{font-family:var(--serif);font-size:30px;line-height:1;letter-spacing:-.02em}
.stat-l{color:var(--ink-mute);font-size:11px;text-transform:uppercase;letter-spacing:.08em;margin-top:6px}
@media(max-width:980px){.hero{grid-template-columns:1fr;text-align:center}.hero-left h1,.hero-sub{text-align:center}.hero-right{justify-content:center}.brand-tagline{white-space:normal;font-size:clamp(36px,8vw,56px)}.brand-tagline::before,.brand-tagline::after{display:none}}

/* hero */
/* hero */
.hero{max-width:1480px;margin:0 auto;padding:48px 28px 24px;text-align:center}
.hero-est{display:inline-flex;align-items:center;gap:10px;padding:8px 18px;border:1px solid var(--ink);border-radius:999px;font-family:var(--mono);font-size:11.5px;letter-spacing:.18em;color:var(--ink);background:transparent}
.hero-est .star{width:8px;height:8px;background:var(--orange);clip-path:polygon(50% 0,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%)}
.hero-title{margin:22px auto 0;font-family:var(--serif);font-weight:400;font-style:normal;line-height:1.02;letter-spacing:-0.02em;font-size:clamp(64px,8.4vw,128px);color:var(--ink);max-width:1100px}
.hero-title .bracket{color:var(--ink);font-weight:300;margin:0 .04em;display:inline-block;transform:translateY(-.04em)}
.hero-title .accent{color:var(--orange)}
.hero-sub{margin:20px auto 0;color:var(--ink-soft);font-size:15px;max-width:620px;line-height:1.6}
.hero-sub em{font-style:normal;color:var(--ink);font-weight:600}
.hero-search{margin:24px auto 0;max-width:560px;display:flex;align-items:center;gap:10px;padding:11px 16px;background:var(--paper);border:1px solid var(--line);border-radius:14px;color:var(--ink-mute);cursor:pointer;transition:.15s;box-shadow:var(--shadow-sm)}
.hero-search:hover{border-color:#1A1B1F26;color:var(--ink-soft);transform:translateY(-1px);box-shadow:var(--shadow-md)}
.hero-search .ht{flex:1;text-align:left;font-size:13.5px}

/* stats strip below hero */
.statsbar{max-width:1480px;margin:28px auto 0;padding:0 28px;display:grid;grid-template-columns:repeat(4,1fr);gap:0;border-top:1px solid var(--ink);border-bottom:1px solid var(--ink)}
.statsbar .scell{padding:18px 22px;border-right:1px solid var(--line)}
.statsbar .scell:last-child{border-right:0}
.statsbar .sn{font-family:var(--serif);font-size:46px;line-height:1;letter-spacing:-.02em}
.statsbar .sn sub{font-family:var(--sans);font-size:13px;font-weight:500;color:var(--ink-mute);margin-left:6px;vertical-align:8px}
.statsbar .sl{margin-top:6px;color:var(--ink-mute);font-size:12px}
.stat{padding:10px 14px;background:var(--paper);border:1px solid var(--line);border-radius:10px;min-width:96px}
.stat-n{font-family:var(--serif);font-size:28px;line-height:1;letter-spacing:-.02em}
.stat-l{color:var(--ink-mute);font-size:11px;text-transform:uppercase;letter-spacing:.08em;margin-top:4px}

/* filter bar */
.filterbar{max-width:1480px;margin:0 auto;padding:10px 28px 18px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.chip{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;border-radius:999px;border:1px solid var(--line);background:var(--paper);font-size:12.5px;color:var(--ink-soft);transition:.15s}
.chip.active{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.chip:hover:not(.active){border-color:#1A1B1F30}
.chip .num{font-family:var(--mono);font-size:11px;opacity:.7;margin-left:2px}
.filter-spacer{flex:1}
.filter-sort{color:var(--ink-mute);font-size:12.5px;display:flex;align-items:center;gap:6px}

/* masonry */
.masonry{max-width:1480px;margin:0 auto;padding:6px 28px 80px;column-count:4;column-gap:18px}
@media(max-width:1400px){.masonry{column-count:3}}
@media(max-width:980px){.masonry{column-count:2}}
@media(max-width:640px){.masonry{column-count:1}}
.card{break-inside:avoid;margin-bottom:18px;background:var(--paper);border:1px solid var(--line);border-radius:16px;overflow:hidden;position:relative;transition:transform .2s, box-shadow .2s;border-left:4px solid var(--brand,#0E0F12)}
.card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.card.closing{animation:cardOut .35s ease forwards}
@keyframes cardOut{to{opacity:0;transform:scale(.94) translateY(8px)}}
.card-head{display:flex;align-items:center;gap:10px;padding:14px 14px 12px;background:linear-gradient(180deg, var(--brand-tint,#EDE6D8) 0%, transparent 100%);border-bottom:1px solid var(--line-soft)}
.fav{width:34px;height:34px;border-radius:9px;background:var(--paper);display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid var(--line);overflow:hidden;box-shadow:var(--shadow-sm)}
.fav img{width:20px;height:20px;display:block;object-fit:contain}
.fav-fallback{font-family:var(--mono);font-weight:600;font-size:13px;color:var(--ink)}
.host{flex:1;min-width:0}
.host-name{font-weight:600;font-size:14px;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.host-meta{color:var(--ink-mute);font-size:11.5px;font-family:var(--mono);margin-top:1px}
.host-meta b{color:var(--ink);font-weight:600}
.card-close{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;color:var(--ink-mute);transition:.15s}
.card-close:hover{background:#FFDCDC;color:var(--red)}
.tabs{padding:6px 0}
.tab{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;position:relative}
.tab:hover{background:var(--bg)}
.tab-dot{width:6px;height:6px;border-radius:50%;background:#1A1B1F25;flex-shrink:0}
.tab.active .tab-dot{background:var(--brand,var(--orange));box-shadow:0 0 0 3px color-mix(in srgb, var(--brand,#FF5A2E) 22%, transparent)}
.tab-title{flex:1;min-width:0;font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tab-path{color:var(--ink-mute);font-size:11px;font-family:var(--mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:38%;text-align:right}
.tab-x{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;color:transparent;flex-shrink:0;transition:.12s}
.tab:hover .tab-x{color:var(--ink-mute)}
.tab-x:hover{background:#FFDCDC;color:var(--red)}
.tab.closing{animation:tabOut .28s ease forwards}
.tab.switching{animation:tabFlash .3s ease}
@keyframes tabFlash{0%{background:color-mix(in srgb, var(--brand,#FF5A2E) 18%, transparent)} 100%{background:transparent}}
@keyframes tabOut{to{opacity:0;transform:translateX(8px);padding-top:0;padding-bottom:0;height:0}}
.expand{width:100%;padding:8px 14px 12px;display:flex;align-items:center;justify-content:center;gap:6px;font-size:12px;color:var(--ink-mute);background:var(--paper)}
.expand:hover{color:var(--orange)}
.card-foot{display:flex;align-items:center;gap:8px;padding:8px 14px 12px;border-top:1px solid var(--line-soft);color:var(--ink-mute);font-size:11.5px}
.card-foot .spacer{flex:1}
.mini-btn{padding:4px 8px;border-radius:6px;font-size:11.5px;color:var(--ink-soft)}
.mini-btn:hover{background:var(--bg);color:var(--ink)}
.mini-btn.danger:hover{background:#FFDCDC;color:var(--red)}

/* fireworks canvas */
#fx{position:fixed;inset:0;pointer-events:none;z-index:60}

/* cmdk */
.cmdk-mask{position:fixed;inset:0;z-index:100;background:#0E0F1266;backdrop-filter:blur(2px);display:none;align-items:flex-start;justify-content:center;padding-top:14vh}
.cmdk-mask.open{display:flex}
.cmdk{width:min(640px,92vw);background:var(--paper);border:1px solid var(--line);border-radius:18px;overflow:hidden;box-shadow:0 20px 60px #0E0F1230, 0 4px 12px #0E0F1220}
.cmdk-top{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--line)}
.cmdk-top input{flex:1;font:inherit;font-size:15px;border:0;outline:none;background:transparent}
.cmdk-list{max-height:50vh;overflow:auto;padding:6px 0}
.cmdk-row{display:flex;align-items:center;gap:10px;padding:10px 18px;cursor:pointer;font-size:13.5px}
.cmdk-row.sel{background:var(--bg-deep)}
.cmdk-row .fav{width:26px;height:26px;border-radius:7px}
.cmdk-row .fav img{width:16px;height:16px}
.cmdk-row .title{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cmdk-row .meta{color:var(--ink-mute);font-size:11px;font-family:var(--mono)}
.cmdk-row mark{background:#FFD83A;color:var(--ink);padding:0 1px;border-radius:2px}
.cmdk-foot{display:flex;gap:14px;padding:10px 18px;border-top:1px solid var(--line);color:var(--ink-mute);font-size:11.5px;background:var(--bg)}
.cmdk-foot .spacer{flex:1}
.cmdk-foot .hint{display:flex;align-items:center;gap:5px}
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <div class="brand"><span class="brand-dot"></span>Tab<em>·</em>Hub</div>
    <button class="search" id="heroSearch">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3-3"/></svg>
      <span class="search-text">搜索打开的标签 · 域名 · 标题</span>
      <kbd>⌘ K</kbd>
    </button>
    <div class="top-actions">
      <button class="btn" title="刷新">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 21v-5h5"/></svg>
        刷新
      </button>
      <button class="btn btn-primary">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 9h18"/></svg>
        归档当前窗口
      </button>
    </div>
  </div>
</header>

<section class="hero">
  <div class="hero-left">
    <h1>当前打开 <em>27 个</em> 标签，<br/>来自 <span class="hl">9 个域名</span>。</h1>
    <p class="hero-sub">瀑布流按域名自动归类，标签多的站排在前面 — 一眼看到哪些站开太多了，顺手清。</p>
  </div>
  <div class="hero-mid">
    <div class="hero-est"><span class="star"></span><span>EST · 2026 · A WEILANX EXPERIMENT</span></div>
    <div class="brand-tagline">我的<span class="accent2">标签</span><br/>在哪里<span class="q">？</span></div>
  </div>
  <div class="hero-right">
    <div class="stat"><div class="stat-n">27</div><div class="stat-l">Tabs</div></div>
    <div class="stat"><div class="stat-n">9</div><div class="stat-l">Domains</div></div>
    <div class="stat"><div class="stat-n">2</div><div class="stat-l">Windows</div></div>
  </div>
</section>

<div class="filterbar">
  <button class="chip active" data-filter="all">全部 <span class="num">27</span></button>
  <button class="chip" data-filter="recent">最近活跃 <span class="num">8</span></button>
  <button class="chip" data-filter="idle">闲置 &gt; 1h <span class="num">11</span></button>
  <button class="chip" data-filter="dup">疑似重复 <span class="num">3</span></button>
  <button class="chip" data-filter="pinned">已固定 <span class="num">2</span></button>
  <div class="filter-spacer"></div>
  <div class="filter-sort">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h13M3 12h9M3 18h5"/></svg>
    标签数降序
  </div>
</div>

<main class="masonry" id="masonry"></main>

<canvas id="fx"></canvas>

<!-- cmdk -->
<div class="cmdk-mask" id="cmdkMask">
  <div class="cmdk">
    <div class="cmdk-top">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3-3"/></svg>
      <input id="cmdkInput" placeholder="搜索 27 个打开的标签…" autocomplete="off" />
      <kbd>ESC</kbd>
    </div>
    <div class="cmdk-list" id="cmdkList"></div>
    <div class="cmdk-foot">
      <div class="hint"><kbd>↑</kbd><kbd>↓</kbd> 选择</div>
      <div class="hint"><kbd>↵</kbd> 跳转</div>
      <div class="hint"><kbd>⌘ ↵</kbd> 后台打开</div>
      <div class="spacer"></div>
      <div>共 <b id="cmdkCount">0</b> 条</div>
    </div>
  </div>
</div>

<script src="tabhub.js"></script>
</body>
</html>
